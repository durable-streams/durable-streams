id: epoch-transition-live-tailing
name: Epoch Transition During Live Tailing
description: |
  Tests that live-tailing consumers (SSE and long-poll) continue to receive
  events after producer epoch transitions caused by autoClaim.

  When an IdempotentProducer with autoClaim=true writes to a stream where
  a higher epoch is already established, it gets a 403 (stale epoch) and
  retries with epoch+1. This epoch transition must not disrupt active SSE
  or long-poll consumers.

  See: https://github.com/durable-streams/durable-streams/issues/292
category: consumer
tags:
  - live
  - epoch
  - autoclaim
  - regression

tests:
  - id: sse-receives-data-after-epoch-transition
    name: SSE consumer receives data after producer epoch transition
    description: |
      A consumer live-tailing via SSE must continue receiving events when
      a producer with autoClaim causes an epoch transition on the same
      stream. The server has epoch 5 established; the client starts at
      epoch 0, gets fenced (403), auto-claims epoch 6, and retries.
      The SSE consumer must receive the new data.
      Reproduces issue #292.
    requires:
      - sse
    setup:
      - action: create
        as: streamPath
        contentType: text/plain
    operations:
      # Establish a high epoch via server-append to force fencing
      - action: server-append
        path: ${streamPath}
        data: "from-epoch-5"
        producerId: epoch-sse-producer
        producerEpoch: 5
        producerSeq: 0
        expect:
          status: 200
          storeOffsetAs: firstOffset

      # Start SSE consumer in background, tailing from the first offset
      - action: read
        path: ${streamPath}
        offset: ${firstOffset}
        live: sse
        maxChunks: 1
        timeoutMs: 5000
        background: true
        as: sseRead

      # Wait for SSE connection to establish
      - action: wait
        ms: 500

      # Producer with autoClaim starts at epoch 0, gets 403 (stale epoch),
      # auto-claims epoch 6, and retries. The data should be appended and
      # the SSE consumer must be notified.
      - action: idempotent-append
        path: ${streamPath}
        producerId: epoch-sse-producer
        epoch: 0
        autoClaim: true
        data: "from-autoclaim"
        expect:
          success: true

      # The SSE consumer must receive the auto-claimed producer's data
      - action: await
        ref: sseRead
        expect:
          dataContains: "from-autoclaim"
          minChunks: 1

  - id: longpoll-receives-data-after-epoch-transition
    name: Long-poll consumer receives data after producer epoch transition
    description: |
      A consumer live-tailing via long-poll must continue receiving events
      when a producer with autoClaim causes an epoch transition.
      Reproduces issue #292.
    requires:
      - long-poll
    setup:
      - action: create
        as: streamPath
        contentType: text/plain
    operations:
      # Establish a high epoch via server-append to force fencing
      - action: server-append
        path: ${streamPath}
        data: "from-epoch-5"
        producerId: epoch-lp-producer
        producerEpoch: 5
        producerSeq: 0
        expect:
          status: 200
          storeOffsetAs: firstOffset

      # Start long-poll consumer in background, tailing from the first offset
      - action: read
        path: ${streamPath}
        offset: ${firstOffset}
        live: long-poll
        timeoutMs: 5000
        background: true
        as: longPollRead

      # Wait for long-poll request to reach the server
      - action: wait
        ms: 500

      # Producer with autoClaim starts at epoch 0, gets fenced, claims epoch 6
      - action: idempotent-append
        path: ${streamPath}
        producerId: epoch-lp-producer
        epoch: 0
        autoClaim: true
        data: "from-autoclaim"
        expect:
          success: true

      # The long-poll consumer must receive the auto-claimed producer's data
      - action: await
        ref: longPollRead
        expect:
          dataContains: "from-autoclaim"
          minChunks: 1

  - id: sse-receives-data-after-multiple-epoch-transitions
    name: SSE consumer survives multiple epoch transitions
    description: |
      A consumer live-tailing via SSE should continue receiving events
      even when multiple successive epoch transitions occur.
    requires:
      - sse
    setup:
      - action: create
        as: streamPath
        contentType: text/plain
    operations:
      # Establish epoch 5 via server-append
      - action: server-append
        path: ${streamPath}
        data: "epoch-5-data"
        producerId: multi-epoch-producer
        producerEpoch: 5
        producerSeq: 0
        expect:
          status: 200

      # First autoClaim producer: gets 403 (epoch 0 < 5), claims epoch 6
      - action: idempotent-append
        path: ${streamPath}
        producerId: multi-epoch-producer
        epoch: 0
        autoClaim: true
        data: "epoch-6-data"
        expect:
          success: true

      # Get current tail offset via head
      - action: head
        path: ${streamPath}
        expect:
          storeAs: headResult

      # Start SSE consumer tailing from latest
      - action: read
        path: ${streamPath}
        offset: ${headResult.offset}
        live: sse
        maxChunks: 1
        timeoutMs: 5000
        background: true
        as: sseRead

      # Wait for SSE connection
      - action: wait
        ms: 500

      # Bump epoch again via server-append (epoch 10)
      - action: server-append
        path: ${streamPath}
        data: "epoch-10-data"
        producerId: multi-epoch-producer
        producerEpoch: 10
        producerSeq: 0
        expect:
          status: 200

      # Consumer must receive the latest write
      - action: await
        ref: sseRead
        expect:
          dataContains: "epoch-10-data"
          minChunks: 1

  - id: catchup-read-after-epoch-transition
    name: Catch-up read sees all data after epoch transitions
    description: |
      After a producer epoch transition via autoClaim, a catch-up read
      must return all data including the auto-claimed write. This verifies
      the data is actually persisted in the stream.
    setup:
      - action: create
        as: streamPath
        contentType: text/plain
    operations:
      # Establish epoch 5 via server-append
      - action: server-append
        path: ${streamPath}
        data: "first-write"
        producerId: catchup-producer
        producerEpoch: 5
        producerSeq: 0
        expect:
          status: 200

      # autoClaim producer: gets 403 (epoch 0 < 5), claims epoch 6
      - action: idempotent-append
        path: ${streamPath}
        producerId: catchup-producer
        epoch: 0
        autoClaim: true
        data: "second-write"
        expect:
          success: true

      # Catch-up read should see everything
      - action: read
        path: ${streamPath}
        live: false
        expect:
          dataContainsAll:
            - "first-write"
            - "second-write"
          upToDate: true
