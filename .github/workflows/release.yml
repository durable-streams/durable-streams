name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      ts_darix_server_release_tag: ${{ steps.ts_darix_server_release_tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      # Workaround for npm/cli#9151: Node 22.22.2 ships npm 10.9.7 which
      # crashes during self-upgrade to 11.x (lazy require of promise-retry).
      # npm 10.9.8 fixes this with an eager require (npm/cli#9152).
      # TODO: Remove the intermediate install once Node 22 bundles npm >=10.9.8
      # (track nodejs/node#62463).
      - name: Update npm for OIDC support
        run: |
          npm install -g npm@10.9.8
          npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test:run

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1.5.3
        with:
          version: pnpm run changeset:version
          publish: pnpm run changeset:publish
          commit: "ci: Version Packages"
          title: "ci: Version Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture the new ts-darix-server release tag
        id: ts_darix_server_release_tag
        if: steps.changesets.outputs.published == 'true'
        run: |
          set -euo pipefail

          published_packages='${{ steps.changesets.outputs.publishedPackages }}'
          tag="$(
            echo "$published_packages" \
              | jq -r '.[] | select(.name == "@durable-streams/ts-darix-server") | .name + "@" + .version'
          )"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Comment on PRs about release
        if: steps.changesets.outputs.published == 'true'
        uses: tanstack/config/.github/comment-on-release@main
        with:
          published-packages: ${{ steps.changesets.outputs.publishedPackages }}

  publish-agent-server-image:
    needs: release
    if: ${{ needs.release.outputs.published == 'true' && needs.release.outputs.ts_darix_server_release_tag != '' }}
    uses: ./.github/workflows/publish-agent-server-dockerhub-image.yml
    secrets: inherit
    with:
      git_ref: ${{ needs.release.outputs.ts_darix_server_release_tag }}
