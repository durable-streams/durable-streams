name: Publish agent-server image to Docker Hub

on:
  workflow_call:
    inputs:
      git_ref:
        description: Git ref to build from, typically a release tag
        required: true
        type: string
      docker_tag:
        description: Optional Docker Hub tag override
        required: false
        type: string
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to build from, typically a release tag
        required: true
        type: string
      docker_tag:
        description: Optional Docker Hub tag override
        required: false
        type: string

env:
  DOCKERHUB_REPO: electricsql/agent-server

permissions:
  contents: read

jobs:
  derive_build_vars:
    name: Derive build variables
    runs-on: ubuntu-latest
    outputs:
      git_ref: ${{ steps.git_ref.outputs.git_ref }}
      build_mode: ${{ steps.git_ref.outputs.build_mode }}
      short_commit_sha: ${{ steps.vars.outputs.short_commit_sha }}
      server_version: ${{ steps.vars.outputs.server_version }}
      docker_tag: ${{ steps.vars.outputs.docker_tag }}

    steps:
      - name: Determine the ref to check out
        id: git_ref
        env:
          INPUT_GIT_REF: ${{ inputs.git_ref }}
          INPUT_DOCKER_TAG: ${{ inputs.docker_tag }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_DOCKER_TAG:-}" ]; then
            echo "git_ref=$INPUT_GIT_REF" >> "$GITHUB_OUTPUT"
            echo "build_mode=custom" >> "$GITHUB_OUTPUT"
          else
            echo "git_ref=refs/tags/$INPUT_GIT_REF" >> "$GITHUB_OUTPUT"
            echo "build_mode=release" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.git_ref.outputs.git_ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Determine short_commit_sha, server_version, and docker_tag
        id: vars
        env:
          BUILD_MODE: ${{ steps.git_ref.outputs.build_mode }}
          INPUT_DOCKER_TAG: ${{ inputs.docker_tag }}
        run: |
          set -euo pipefail

          short_commit_sha="$(git rev-parse --short HEAD)"
          echo "short_commit_sha=$short_commit_sha" >> "$GITHUB_OUTPUT"

          server_version="$(
            git describe --abbrev=7 --tags --always --first-parent --match '@durable-streams/ts-darix-server@*' \
              | sed -En 's|^@durable-streams/ts-darix-server@||p'
          )"
          if [ "$BUILD_MODE" = "release" ] && [ -z "$server_version" ]; then
            echo "Could not determine ts-darix-server version from the checked out ref" >&2
            exit 1
          fi
          echo "server_version=$server_version" >> "$GITHUB_OUTPUT"

          if [ -n "${INPUT_DOCKER_TAG:-}" ]; then
            docker_tag="$INPUT_DOCKER_TAG"
          else
            docker_tag="$server_version"
          fi
          echo "docker_tag=$docker_tag" >> "$GITHUB_OUTPUT"

  build_and_push_image:
    name: Build and push per-platform image
    runs-on: ubuntu-latest
    needs: derive_build_vars
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            platform_id: amd64
          - platform: linux/arm64
            platform_id: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.derive_build_vars.outputs.git_ref }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/ts-darix-server/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          tags: ${{ env.DOCKERHUB_REPO }}

      - name: Export digest
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ matrix.platform_id }}.digest"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform_id }}
          path: /tmp/digests/*

  publish_tagged_image:
    name: Publish multi-arch manifest
    runs-on: ubuntu-latest
    needs:
      - derive_build_vars
      - build_and_push_image

    steps:
      - uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: actions/download-artifact@v4
        with:
          pattern: digests-*
          merge-multiple: true
          path: /tmp/digests

      - name: Derive image tags
        env:
          BUILD_MODE: ${{ needs.derive_build_vars.outputs.build_mode }}
          DOCKER_TAG: ${{ needs.derive_build_vars.outputs.docker_tag }}
          SERVER_VERSION: ${{ needs.derive_build_vars.outputs.server_version }}
        run: |
          set -euo pipefail

          if [ "$BUILD_MODE" = "release" ]; then
            echo "IMAGE_TAGS=-t $DOCKERHUB_REPO:latest -t $DOCKERHUB_REPO:$SERVER_VERSION" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAGS=-t $DOCKERHUB_REPO:$DOCKER_TAG" >> "$GITHUB_ENV"
          fi

      - name: Create multi-arch manifest list
        run: |
          set -euo pipefail

          IMAGES=$(
            for f in /tmp/digests/*.digest; do
              echo "$DOCKERHUB_REPO@$(cat "$f")"
            done
          )

          docker buildx imagetools create $IMAGE_TAGS $IMAGES
